<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo — PixelShop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="_shared.css"/>
  <style>
    .page-hero {
      background: linear-gradient(135deg, rgba(0,229,255,0.05) 0%, rgba(255,45,111,0.03) 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 0 40px;
    }
    /* Sidebar game list */
    .sidebar-game-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; padding: 12px 16px;
      font-family: var(--font-ui); font-weight: 600; font-size: 0.9rem;
      color: var(--muted); cursor: pointer; width: 100%;
      text-align: left; transition: all 0.2s; margin-bottom: 6px;
    }
    .sidebar-game-btn:hover { border-color: var(--border); color: var(--text); }
    .sidebar-game-btn.active {
      background: rgba(0,229,255,0.08);
      border-color: rgba(0,229,255,0.35);
      color: var(--cyan);
    }
    .sidebar-game-emoji { font-size: 1.3rem; }
    .sidebar-game-count { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .sidebar-game-btn.active .sidebar-game-count { color: rgba(0,229,255,0.6); }

    /* Category pills */
    .cat-pill-bar { overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
    .cat-pill-bar::-webkit-scrollbar { display: none; }

    /* Search */
    .ps-search-wrap { position: relative; }
    .ps-search {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 16px 10px 42px;
      font-family: var(--font-body); font-size: 0.88rem;
      color: var(--text); width: 100%;
      outline: none; transition: border-color 0.2s;
    }
    .ps-search:focus { border-color: rgba(0,229,255,0.4); }
    .ps-search::placeholder { color: var(--muted); }
    .ps-search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; }

    /* Sort select */
    .ps-select {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-family: var(--font-ui); font-weight: 600; font-size: 0.85rem;
      color: var(--text); outline: none; cursor: pointer;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state-icon { font-size: 3rem; margin-bottom: 16px; }

    @media (max-width: 991px) {
      .sidebar-col { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
      .sidebar-col::-webkit-scrollbar { display: none; }
      .sidebar-game-btn { min-width: 140px; margin-bottom: 0; flex-shrink: 0; }
    }
  </style>
</head>
<body>
  <div id="ps-nav"></div>

  <!-- PAGE HERO -->
  <div class="page-hero z1">
    <div class="container">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
          <li class="breadcrumb-item active">Catálogo</li>
        </ol>
      </nav>
      <div class="ps-section-label">Todos los productos</div>
      <div class="ps-section-title" style="margin-bottom:0">Catálogo <span>Gaming</span></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <section class="py-4 z1">
    <div class="container">

      <!-- Mobile game selector -->
      <div class="d-lg-none mb-3">
        <div class="sidebar-col" id="mobileSidebar"></div>
      </div>

      <div class="row g-4">
        <!-- SIDEBAR (desktop) -->
        <div class="col-lg-3 d-none d-lg-block">
          <div style="position:sticky;top:80px">
            <div style="font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Juegos</div>
            <div id="desktopSidebar"></div>
          </div>
        </div>

        <!-- PRODUCT AREA -->
        <div class="col-lg-9">
          <!-- Toolbar -->
          <div class="d-flex gap-3 mb-4 flex-wrap align-items-center">
            <div class="ps-search-wrap flex-grow-1" style="min-width:180px">
              <i class="fas fa-search ps-search-icon"></i>
              <input class="ps-search" id="searchInput" placeholder="Buscar producto..." oninput="renderProducts()"/>
            </div>
            <select class="ps-select" id="sortSelect" onchange="renderProducts()">
              <option value="default">Orden: Default</option>
              <option value="price-asc">Precio: Menor</option>
              <option value="price-desc">Precio: Mayor</option>
              <option value="avail">Disponibles primero</option>
            </select>
          </div>

          <!-- Game header -->
          <div id="gameHeader" class="mb-4"></div>

          <!-- Category pills -->
          <div class="cat-pill-bar mb-4">
            <ul class="nav ps-pills gap-2 flex-nowrap" id="catPills"></ul>
          </div>

          <!-- Products grid -->
          <div class="row g-3" id="productsGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="ps-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>
  <script src="ps.js"></script>
  <script>
    PS.init('catalogo');

    let activeGame = null;
    let activeCat  = 'all';

    // Read URL param
    const urlParams = new URLSearchParams(window.location.search);
    const paramGame = urlParams.get('juego');

    // Build sidebars
    function buildSidebars() {
      ['desktopSidebar','mobileSidebar'].forEach(id => {
        const el = document.getElementById(id);
        // "All" button
        el.innerHTML = `<button class="sidebar-game-btn${!activeGame?' active':''}" onclick="selectGame(null)">
          <span class="sidebar-game-emoji">🎮</span>
          <div><div>Todos los juegos</div><div class="sidebar-game-count">${GAMES.reduce((a,g)=>a+g.categories.reduce((b,c)=>b+c.products.length,0),0)} productos</div></div>
        </button>`;
        GAMES.forEach(g => {
          const total = g.categories.reduce((a,c)=>a+c.products.length,0);
          el.innerHTML += `<button class="sidebar-game-btn${activeGame===g.id?' active':''}" onclick="selectGame('${g.id}')">
            <span class="sidebar-game-emoji">${g.emoji}</span>
            <div><div>${g.name}</div><div class="sidebar-game-count">${total} productos</div></div>
          </button>`;
        });
      });
    }

    function selectGame(gameId) {
      activeGame = gameId;
      activeCat  = 'all';
      buildSidebars();
      renderHeader();
      renderCatPills();
      renderProducts();
    }

    function renderHeader() {
      const el = document.getElementById('gameHeader');
      if (!activeGame) { el.innerHTML = ''; return; }
      const g = GAMES.find(x=>x.id===activeGame);
      el.innerHTML = `
        <div style="background:linear-gradient(135deg,${g.color}22,${g.color2}44);border:1px solid ${g.color}44;border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px">
          <span style="font-size:2.6rem">${g.emoji}</span>
          <div>
            <div style="font-family:var(--font-head);font-size:1.2rem;font-weight:800;color:var(--text)">${g.name}</div>
            <div style="font-size:0.82rem;color:var(--muted)">${g.tagline}</div>
          </div>
        </div>`;
    }

    function renderCatPills() {
      const el = document.getElementById('catPills');
      if (!activeGame) { el.innerHTML = ''; return; }
      const g = GAMES.find(x=>x.id===activeGame);
      el.innerHTML = `<li class="nav-item"><button class="nav-link${activeCat==='all'?' active':''}" onclick="selectCat('all')">Todos</button></li>`;
      g.categories.forEach(c => {
        el.innerHTML += `<li class="nav-item"><button class="nav-link${activeCat===c.id?' active':''}" onclick="selectCat('${c.id}')">${c.label}</button></li>`;
      });
    }

    function selectCat(catId) {
      activeCat = catId;
      renderCatPills();
      renderProducts();
    }

    function parsePrice(p) { return parseFloat(p.replace(/[$,]/g,''))||0; }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sort   = document.getElementById('sortSelect').value;

      let products = [];
      const games = activeGame ? GAMES.filter(g=>g.id===activeGame) : GAMES;
      games.forEach(g => {
        const cats = activeCat==='all' ? g.categories : g.categories.filter(c=>c.id===activeCat);
        cats.forEach(c => {
          c.products.forEach(p => products.push({ ...p, gameName:g.name, gameEmoji:g.emoji, gameId:g.id, catLabel:c.label }));
        });
      });

      // Search filter
      if (search) products = products.filter(p => p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search) || p.gameName.toLowerCase().includes(search));

      // Sort
      if (sort==='price-asc')  products.sort((a,b)=>parsePrice(a.price)-parsePrice(b.price));
      if (sort==='price-desc') products.sort((a,b)=>parsePrice(b.price)-parsePrice(a.price));
      if (sort==='avail')      products.sort((a,b)=>b.avail-a.avail);

      if (products.length===0) {
        grid.innerHTML = `<div class="col-12"><div class="empty-state"><div class="empty-state-icon">🔍</div><div style="font-family:var(--font-ui);font-size:1.1rem;font-weight:700;margin-bottom:8px">Sin resultados</div><div style="font-size:0.85rem">Intenta con otro término o filtro.</div></div></div>`;
        return;
      }

      grid.innerHTML = products.map(p => {
        const waMsg = `Hola PixelShop! Quiero comprar: ${p.name} (${p.gameName}) - ${p.price} MXN. Por favor confirma disponibilidad y método de pago.`;
        const showGame = !activeGame;
        return `
          <div class="col-6 col-md-4">
            <div class="product-card">
              <div class="d-flex justify-content-between align-items-start mb-1">
                <div class="product-icon">${p.icon}</div>
                ${showGame ? `<span style="font-size:0.7rem;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:2px 8px;color:var(--muted);font-family:var(--font-ui)">${p.gameEmoji} ${p.gameName}</span>` : ''}
              </div>
              <span class="${p.avail?'badge-avail':'badge-sold'}">${p.avail?'Disponible':'Agotado'}</span>
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.desc}</div>
              <div class="product-price">${p.price} <small>MXN</small></div>
              <a class="btn-wa-sm${p.avail?'':' sold'}" ${p.avail?`href="${PS.waLink(waMsg)}" target="_blank"`:'href="#"'}>
                <i class="fab fa-whatsapp"></i> ${p.avail?'Comprar':'Agotado'}
              </a>
            </div>
          </div>`;
      }).join('');
    }

    // Init
    if (paramGame && GAMES.find(g=>g.id===paramGame)) activeGame = paramGame;
    buildSidebars();
    renderHeader();
    renderCatPills();
    renderProducts();
  </script>
</body>
</html>
